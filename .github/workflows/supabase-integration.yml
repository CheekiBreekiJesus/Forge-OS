name: Supabase Integration

on:
  pull_request:
    paths:
      - ".github/workflows/supabase-integration.yml"
      - "package-lock.json"
      - "package.json"
      - "src/persistence/supabase/**"
      - "supabase/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  supabase-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      FORGEOS_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Print Node and npm versions
        run: |
          node --version
          npm --version
      - run: npm ci
      - run: npm run test:supabase:integration
